# Dogfood: enforce napi-rs's own lifecycle-script audit with script-jail.
#
# This workflow runs script-jail @v0.2.8 in the Docker audit backend with
# `mode: check` + `install: true`.  On every PR that touches yarn.lock, the
# script-jail config, or this workflow, it re-audits all lifecycle scripts in an
# isolated Docker sandbox and FAILS the build if the freshly-generated audit
# diverges from the committed `.script-jail.lock.yml` — catching any new/changed
# dependency lifecycle behavior (supply-chain drift) before it can land.  When the
# audit matches, `install: true` ALSO materializes deps on the runner (the drop-in
# safe install), so this one job both enforces the lock and installs.
#
# Why `install: true` is now safe with a `yarnPath` repo (v0.2.8): napi-rs pins
# Yarn via `.yarnrc.yml` `yarnPath` (.yarn/releases/yarn-4.17.0.cjs) plus an exact
# `packageManager: "yarn@4.17.0"`.  The repo's OWN committed `.yarn/releases` yarn
# is trusted toolchain (the repo is CI's trust root, not dependency code), so
# script-jail allows a repoDir-contained `yarnPath` when it is paired with an exact
# `packageManager` pin.  Both the sandbox audit and the host install set
# `YARN_IGNORE_PATH=1` and corepack-resolve the pinned 4.17.0, so the audited Phase
# B and the host install run the SAME yarn — no audit-vs-host divergence, no
# pre-trust re-exec of the vendored binary.  (A `yarnPath` that ESCAPES the repo,
# or any `plugins`/`enableConstraintsChecks` rc, is still refused.)
#
# Why Docker: GitHub-hosted runners have Docker but not /dev/kvm, so the
# Firecracker backend is unavailable and `backend: docker` is the chosen backend;
# Docker also writes the audit events/strace to the host-backed overlay (no fixed
# 4 GB scratch disk), so a large monorepo like napi-rs does not ENOSPC the way the
# fixed-disk VM backends can.  The committed lock is backend-specific
# (Docker-produced).  setup-node intentionally has no `cache: yarn`: this job runs
# no host `yarn install` of its own (script-jail performs the audit install in the
# sandbox), so there is no host yarn cache to restore/save.
name: script-jail check

on:
  workflow_dispatch: {}
  # Run on PRs that touch the lockfile or the script-jail config/workflow.
  pull_request:
    paths:
      - 'yarn.lock'
      - '.script-jail.yml'
      - '.script-jail.lock.yml'
      - '.github/workflows/script-jail.yml'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # napi-rs pins yarn@4.17.0 via corepack (packageManager + yarnPath).  The
      # install:true host install runs the REAL `yarn install` on the runner, so
      # the runner's yarn must be the pinned 4.17.0 — corepack resolves it from the
      # pin.  Without this the runner's pre-installed classic yarn 1.22.22 is used
      # and refuses the packageManager pin.
      - name: Enable corepack (host yarn 4.17.0 for install:true)
        run: corepack enable
      - name: script-jail check + safe install (Docker backend, enforce committed lock)
        uses: Brooooooklyn/script-jail@v0.2.8
        with:
          mode: check
          install: true
          backend: docker
          spoof-platform: linux
          spoof-arch: x64
      # On a check-mode failure, surface the freshly-generated lock for diffing.
      - name: Upload regenerated lock on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: script-jail-lock
          # .script-jail.* are dotfiles; upload-artifact@v4 skips hidden files by default.
          include-hidden-files: true
          path: |
            .script-jail.lock.yml
            .script-jail.yml
