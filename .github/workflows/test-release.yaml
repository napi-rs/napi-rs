name: Test & Release

env:
  DEBUG: 'napi:*'
  RUST_BACKTRACE: 1
  # https://github.com/nodejs/node/issues/51555#issuecomment-2290742072
  DISABLE_V8_COMPILE_CACHE: 1

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # Supply-chain gate: audit every lifecycle script in the lockfile before any
  # other job runs. Every job below `needs: audit`, so nothing installs deps or
  # runs until the audit is clean. On a clean audit the rest of the pipeline
  # installs deps with a normal `yarn install`.
  audit:
    name: Audit lifecycle scripts (script-jail)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # Docker backend: GitHub-hosted runners have Docker but no /dev/kvm (so the
      # Firecracker backend is unavailable), and Docker writes the audit
      # events/strace to the host-backed overlay — no fixed scratch disk to
      # ENOSPC on a large monorepo. The committed `.script-jail.lock.yml` is
      # Docker-produced + linux/x64-spoofed, so the backend/spoof must match.
      #
      # mode:check (audit only — no `install: true`): script-jail re-runs the
      # two-phase lifecycle audit inside the sandbox and FAILS the job if the
      # freshly generated lock diverges from the committed one (supply-chain
      # drift). It does NOT materialize node_modules on the runner — every other
      # job installs deps with its own normal `yarn install`. This job is the
      # gate for the whole pipeline.
      - name: script-jail audit (enforce committed lock)
        uses: Brooooooklyn/script-jail@v0.2.10
        with:
          mode: check
          backend: docker
          spoof-platform: linux
          spoof-arch: x64

      # On a check-mode failure, surface the freshly generated lock for diffing.
      - name: Upload regenerated lock on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: script-jail-lock
          # .script-jail.* are dotfiles; upload-artifact skips hidden files by default.
          include-hidden-files: true
          path: |
            .script-jail.lock.yml
            .script-jail.yml

  lint:
    name: Lint SourceCode
    runs-on: ubuntu-latest
    needs: audit

    steps:
      - uses: actions/checkout@v7

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: lint-cargo-cache

      - name: 'Install dependencies'
        run: yarn install --immutable --mode=skip-build

      - name: 'Lint JS/TS'
        run: yarn lint

      - name: Cargo fmt
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy

  trybuild:
    # trybuild snapshots include rustc's rendered diagnostics. Run them once on
    # stable Linux instead of multiplying compiler-version-specific text checks
    # across every Node/platform matrix entry.
    name: Compile-fail API contracts (stable Linux)
    runs-on: ubuntu-latest
    needs: audit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: trybuild-stable-linux-cargo-cache
      - name: Run compile-fail API contracts
        run: cargo test -p napi-examples --test macro_tests -- --ignored

  test-cli-node-baselines:
    name: Packed CLI - node@${{ matrix.node }}
    runs-on: ubuntu-latest
    needs: audit
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: ['20.17.0', '22.13.0']
    steps:
      - uses: actions/checkout@v7
      - name: Setup build node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install --immutable --mode=skip-build
      - name: Build CLI package
        run: yarn workspace @napi-rs/cli build
      - name: Setup test node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Test packed raw CLI
        run: node cli/e2e/raw-cli-test.mjs

  build_and_test:
    needs: audit
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24', '26']
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: yarn build:test
            test: |
              yarn test:cli
              yarn test
              yarn workspace @examples/napi test:leak
              yarn tsc -p examples/napi/tsconfig.json --noEmit --skipLibCheck
              cargo test
            toolchain: stable
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: yarn build:test
            test: |
              yarn test:cli
              yarn test
              yarn tsc -p examples/napi/tsconfig.json --noEmit --skipLibCheck
              cargo test -p napi --features napi4 --test threadsafe_function_api_compile
            toolchain: 1.88.0
          - host: macos-latest
            target: aarch64-apple-darwin
            build: yarn build:test
            test: |
              yarn test:cli
              yarn test
              yarn workspace @examples/napi test:leak
              yarn tsc -p examples/napi/tsconfig.json --noEmit --skipLibCheck
              RUSTFLAGS="-C link-args=-Wl,-undefined,dynamic_lookup,-no_fixup_chains" cargo test
            toolchain: stable
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: |
              yarn workspace @examples/custom-async-runtime build
              yarn workspace @examples/napi build
            test: |
              yarn test:cli
              yarn workspace @examples/napi test
              yarn workspace @examples/napi test:leak
              yarn tsc -p examples/napi/tsconfig.json --noEmit --skipLibCheck
              cargo test
            toolchain: stable
          - host: windows-11-arm
            target: aarch64-pc-windows-msvc
            build: yarn build:test
            test: |
              yarn test:cli
              yarn test
            toolchain: stable
          - host: windows-latest
            target: i686-pc-windows-msvc
            build: |
              yarn workspace @examples/custom-async-runtime build --target i686-pc-windows-msvc --release
              yarn workspace @examples/napi build --target i686-pc-windows-msvc --release
              yarn workspace @examples/compat-mode build --target i686-pc-windows-msvc --release
            test: |
              export NODE_OPTIONS="--max-old-space-size=3072"
              yarn workspace @examples/napi test -s
              node ./.github/install-electron.mjs
              node -e "const p='node_modules/electron/path.txt'; if(!require('fs').existsSync(p)){console.log('::error::Electron binary missing ('+p+') after install');process.exit(1)}"
              yarn test:electron
            toolchain: stable
    name: ${{ matrix.settings.target }} - node@${{ matrix.node }} - toolchain@ ${{ matrix.settings.toolchain }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v7

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'yarn'

      - name: Install rustup (Windows 11 ARM)
        if: matrix.settings.host == 'windows-11-arm'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://static.rust-lang.org/rustup/dist/aarch64-pc-windows-msvc/rustup-init.exe" -OutFile rustup-init.exe
          .\rustup-init.exe --default-toolchain none -y
          "$env:USERPROFILE\.cargo\bin" | Out-File -Append -Encoding ascii $env:GITHUB_PATH
          "CARGO_HOME=$env:USERPROFILE\.cargo" | Out-File -Append -Encoding ascii $env:GITHUB_ENV

      - name: Install Rust (Windows 11 ARM)
        if: matrix.settings.host == 'windows-11-arm'
        shell: pwsh
        run: |
          rustup install stable
          rustup target add ${{ matrix.settings.target }}
          cargo --version

      - name: Install
        uses: dtolnay/rust-toolchain@stable
        if: matrix.settings.host != 'windows-11-arm'
        with:
          toolchain: ${{ matrix.settings.toolchain }}
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.settings.host }}-${{ matrix.settings.toolchain }}-${{ matrix.settings.target }}-cargo-cache

      - name: 'Install dependencies'
        shell: bash
        run: |
          yarn config set supportedArchitectures.cpu --json '["current", "x64", "ia32", "wasm32"]'
          yarn install --mode=skip-build --immutable

      - name: Check build
        run: cargo check --target ${{ matrix.settings.target }} --all --bins --examples --tests -vvv

      - name: Build tests
        if: matrix.settings.build
        run: ${{ matrix.settings.build }}
        env:
          CARGO_PROFILE_DEV_OPT_LEVEL: 1

      - name: Setup node
        uses: actions/setup-node@v6
        if: matrix.settings.target == 'i686-pc-windows-msvc'
        with:
          node-version: 22
          architecture: 'x86'

      - name: Unit tests
        if: matrix.settings.test
        run: ${{ matrix.settings.test }}
        shell: bash
        timeout-minutes: 10
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          DISABLE_V8_COMPILE_CACHE: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Electron tests
        if: matrix.settings.target == 'aarch64-apple-darwin' || matrix.settings.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: |
          node ./.github/install-electron.mjs
          node -e "const p='node_modules/electron/path.txt'; if(!require('fs').existsSync(p)){console.log('::error::Electron binary missing ('+p+') after install');process.exit(1)}"
          yarn test:electron

      - name: Electron tests
        if: matrix.settings.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          node ./.github/install-electron.mjs
          node -e "const p='node_modules/electron/path.txt'; if(!require('fs').existsSync(p)){console.log('::error::Electron binary missing ('+p+') after install');process.exit(1)}"
          xvfb-run --auto-servernum yarn test:electron

      - name: Test build with profile
        run: yarn workspace @examples/napi build --profile napi-rs-custom

  build-and-test-msys2:
    needs: audit
    strategy:
      matrix:
        sys: [MINGW64, UCRT64, CLANG64]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.sys }}
          update: true
          install: >-
            base-devel
          pacboy: >-
            rust:p
            yarn:p
            ${{ matrix.sys == 'CLANG64' && 'gcc-compat:p' || '' }}

      - name: Cargo test
        shell: msys2 {0}
        run: |
          cargo test
      - name: Build and load addon
        shell: msys2 {0}
        run: |
          cargo build -p napi-examples
          cp target/debug/napi_examples.dll examples/napi/napi_examples.node
          node -e "require('./examples/napi/napi_examples.node')"
  # Because dependencies use napi-rs itself they use older versions of napi-rs to install the package, this will fail automatically during build, uncomment when bootstrap issues have been solved
  #    - name: Install dependencies
  #      shell: msys2 {0}
  #      run: |
  #        yarn install --immutable --mode=skip-build
  #
  #    - name: Build tests
  #      shell: msys2 {0}
  #      run: yarn build:test
  #
  #    - name: Run tests
  #      shell: msys2 {0}
  #      run: |
  #        yarn test:cli
  #        yarn test
  #        yarn tsc -p examples/napi/tsconfig.json --noEmit --skipLibCheck
  #        yarn test:macro

  build_only:
    name: Build only test - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    needs: audit
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: aarch64-linux-android
          - host: ubuntu-latest
            target: armv7-linux-androideabi
          - host: ubuntu-24.04
            target: aarch64-unknown-linux-ohos
          - host: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
            setup: |
              sudo apt-get update
              sudo apt-get install -y gcc-riscv64-linux-gnu
          - host: ubuntu-latest
            target: loongarch64-unknown-linux-gnu
            # TODO: Switch to gcc-loongarch64-linux when available
            setup: |
              sudo apt-get update
              sudo apt-get install -y gcc-13-loongarch64-linux-gnu

    steps:
      - uses: actions/checkout@v7

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - name: Setup OpenHarmony SDK
        if: ${{ contains(matrix.settings.target, 'ohos') }}
        uses: openharmony-rs/setup-ohos-sdk@v1.0

      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: stable-${{ matrix.settings.host }}-${{ matrix.settings.target }}-cargo-cache

      - name: Setup toolchain
        if: matrix.settings.setup
        run: ${{ matrix.settings.setup }}

      - name: Install dependencies
        run: yarn install --immutable --mode=skip-build

      - name: Cross build native tests
        run: yarn build:test -- --target ${{ matrix.settings.target }} --release
        shell: bash
        env:
          TARGET_CC: clang

  build_for_test_in_docker:
    name: build - ${{ matrix.settings.target }}
    runs-on: ubuntu-latest
    needs: audit
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: powerpc64le-unknown-linux-gnu
          - target: s390x-unknown-linux-gnu
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v7

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            ~/.napi-rs
          key: stable-ubuntu-latest-${{ matrix.settings.target }}-cargo-cache

      - name: Install dependencies
        run: yarn install --immutable --mode=skip-build

      - name: Cross build native tests
        run: yarn build:test -- --target ${{ matrix.settings.target }} --release --use-napi-cross
        shell: bash
        env:
          CARGO_PROFILE_DEV_OPT_LEVEL: 1
          TARGET_CC: clang

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.settings.target }}-example
          path: |
            examples/napi/*.node
            examples/napi/module-init-rollback/*.node
            examples/napi/tsfn-retention/*.node
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.settings.target }}-custom-async-runtime
          path: |
            examples/custom-async-runtime/index.cjs
            examples/custom-async-runtime/*.node
            examples/custom-async-runtime/.pure-runtime/*.node
          include-hidden-files: true
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.settings.target }}-example-compat
          path: examples/napi-compat-mode/index.node

  build_musl:
    name: build - ${{ matrix.settings.target }}
    runs-on: ubuntu-latest
    needs: audit
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v7

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Install dependencies
        run: yarn install --immutable --mode=skip-build

      - name: Install ziglang
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            .cargo-cache/registry
            .cargo-cache/git
            target
          key: stable-${{ matrix.settings.target }}-cargo-cache

      - name: Cross build musl
        run: yarn build:test -- --target ${{ matrix.settings.target }} -x

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.settings.target }}-example
          path: |
            examples/napi/*.node
            examples/napi/module-init-rollback/*.node
            examples/napi/tsfn-retention/*.node
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.settings.target }}-custom-async-runtime
          path: |
            examples/custom-async-runtime/index.cjs
            examples/custom-async-runtime/*.node
            examples/custom-async-runtime/.pure-runtime/*.node
          include-hidden-files: true
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.settings.target }}-example-compat
          path: examples/napi-compat-mode/index.node
          if-no-files-found: error

  test_in_docker:
    name: Test - ${{ matrix.settings.target }} - ${{ matrix.node }}
    # Node.js on qemu segfaults on s390x and arm64v8 when using 24.04
    # See also https://github.com/actions/runner-images/issues/11471
    runs-on: ${{ contains(matrix.settings.target, 'aarch64') && 'ubuntu-24.04-arm' || 'ubuntu-22.04' }}
    permissions:
      contents: read
    needs:
      - build_musl
      - build_for_test_in_docker
    strategy:
      fail-fast: false
      matrix:
        # Node 26 images ship without a bundled yarn/corepack launcher, so
        # `yarn` is not found inside the containers. Test Node 26 in the
        # build_and_test matrix instead (which uses the repo-pinned Yarn 4).
        node: [22, 24]
        settings:
          - image: 'node:{:version}-slim'
            target: x86_64-unknown-linux-gnu
            args: ''
            arch: 'x64'
            libc: 'gnu'
          - image: 'node:{:version}-slim'
            target: aarch64-unknown-linux-gnu
            args: '--platform linux/arm64'
            arch: 'arm64'
            libc: 'gnu'
          - image: 'node:{:version}-slim'
            target: powerpc64le-unknown-linux-gnu
            args: '--platform linux/ppc64le'
            arch: 'ppc64'
            libc: 'gnu'
          - image: 'node:{:version}-slim'
            target: s390x-unknown-linux-gnu
            args: '--platform linux/s390x'
            arch: 's390x'
            libc: 'gnu'
          - image: 'node:{:version}-alpine'
            target: x86_64-unknown-linux-musl
            args: ''
            arch: 'x64'
            libc: 'musl'
          - image: 'node:{:version}-alpine'
            target: aarch64-unknown-linux-musl
            args: '--platform linux/arm64'
            arch: 'arm64'
            libc: 'musl'
    steps:
      - uses: actions/checkout@v7

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.settings.target }}-example
          path: examples/napi/
      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.settings.target }}-custom-async-runtime
          path: examples/custom-async-runtime/
      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.settings.target }}-example-compat
          path: examples/napi-compat-mode/
      - name: Install dependencies
        if: ${{ matrix.settings.arch != 's390x' }}
        run: |
          yarn config set --json supportedArchitectures.cpu '["current", "${{ matrix.settings.arch }}"]'
          yarn config set --json supportedArchitectures.libc '["current", "${{ matrix.settings.libc }}"]'
          yarn install --immutable --mode=skip-build
      - name: Install dependencies
        if: ${{ matrix.settings.arch == 's390x' }}
        run: |
          yarn config set --json supportedArchitectures.cpu '["current", "wasm32"]'
          yarn install --immutable --mode=skip-build
          yarn workspace @napi-rs/wasm-runtime build
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        if: ${{ !contains(matrix.settings.target, 'aarch64') }}
        with:
          platforms: all
          image: tonistiigi/binfmt:qemu-v8.1.5
      - run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
        if: ${{ !contains(matrix.settings.target, 'aarch64') }}
      - name: Setup image name
        id: image-name
        run: |
          node -e "console.info('docker-image=${{ matrix.settings.image }}'.replace('{:version}', ${{ matrix.node }}))" >> "$GITHUB_OUTPUT"
      - name: Setup and run tests
        # Node.js on qemu randomly segfaults on powerpc64le
        continue-on-error: ${{ matrix.settings.target == 'powerpc64le-unknown-linux-gnu' || matrix.settings.target == 's390x-unknown-linux-gnu' }}
        run: >-
          docker run --rm
          ${{ matrix.settings.args }}
          -v ${{ github.workspace }}:/build -w /build
          ${{ steps.image-name.outputs.docker-image }}
          sh -c "export NODE_OPTIONS=--max-old-space-size=8192 && export DISABLE_V8_COMPILE_CACHE=1 && yarn workspace @examples/napi test"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-test-linux-armv7:
    name: stable - armv7-unknown-linux-gnueabihf - node@22
    runs-on: ubuntu-latest
    needs: audit

    steps:
      - uses: actions/checkout@v7

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: armv7-unknown-linux-gnueabihf

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: stable-linux-armv7-gnueabihf-node@22-cargo-cache

      - name: Install dependencies
        run: |
          yarn config set --json supportedArchitectures.cpu '["arm", "current"]'
          yarn install --immutable --mode=skip-build

      - name: Cross build native tests
        run: yarn build:test -- --target armv7-unknown-linux-gnueabihf --use-napi-cross
        env:
          TARGET_CC: clang

      - run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Setup and run tests
        run: >-
          docker run --rm
          --platform linux/arm/v7
          -v ${{ github.workspace }}:/build -w /build
          node:22-slim
          sh -c "yarn test"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_binary_crate:
    runs-on: ubuntu-latest
    name: Test cli build binary
    needs: audit
    steps:
      - uses: actions/checkout@v7

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: stable-cargo-cache-build-binary

      - name: 'Install dependencies'
        run: yarn install --mode=skip-build --immutable

      - name: Build and run binary
        run: |
          yarn workspace binary build
          ./examples/binary/napi-examples-binary
          yarn workspace binary build --profile napi-rs-custom

  check-all-features:
    needs: audit
    strategy:
      fail-fast: false
      matrix:
        settings:
          - features: 'napi1,napi2,napi3,napi4,napi5,napi6,napi7,napi8,napi9,experimental,async,chrono_date,latin1,full'
            package: 'napi'
            extra_args: '--no-default-features'
          - features: 'napi3'
            package: 'napi'
            extra_args: '--no-default-features'
          - features: 'napi3,compat-mode'
            package: 'napi'
            extra_args: '--no-default-features'
          - features: 'napi9'
            package: 'napi'
            extra_args: '--no-default-features'
          - features: 'napi3,serde-json'
            package: 'napi'
            extra_args: '--no-default-features'
          - features: 'napi9,serde-json'
            package: 'napi'
            extra_args: '--no-default-features'
          - features: 'async,compat-mode'
            package: 'napi'
            extra_args: '--no-default-features'
          - features: 'compat-mode,strict,type-def,noop,full,default'
            package: 'napi-derive'
          - features: 'noop'
            package: 'napi-examples'
          - features: 'snmalloc'
            package: 'napi-examples'
    name: stable - ubuntu-latest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Check build
        run: cargo check -p ${{ matrix.settings.package }} ${{ matrix.settings.extra_args }} -F ${{ matrix.settings.features }}

      - name: Test N-API thread-affinity and cleanup-hook contracts
        if: matrix.settings.package == 'napi' && matrix.settings.features == 'napi3'
        run: |
          cargo test -p napi --no-default-features --features napi1 --test thread_affinity_api
          cargo test -p napi --no-default-features --features napi3 --test thread_affinity_api --test cleanup_hook_api
          cargo test -p napi --no-default-features --features napi4 --test thread_affinity_api --test cleanup_hook_api

  test-freebsd:
    runs-on: ubuntu-latest
    name: Test freebsd target
    needs: audit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Install ziglang
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - uses: jaxxstorm/action-install-gh-release@v3.0.0
        with:
          repo: rust-cross/cargo-zigbuild
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-freebsd

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: stable-cargo-cache-build-freebsd

      - name: 'Install dependencies'
        run: |
          yarn config set supportedArchitectures.cpu --json '["current", "x64", "arm64", "wasm32"]'
          yarn config set supportedArchitectures.os --json '["current", "freebsd"]'
          yarn install --mode=skip-build --immutable
      - name: Build
        run: |
          yarn workspace @examples/custom-async-runtime build --target x86_64-unknown-freebsd -x
          yarn workspace @examples/napi build --target x86_64-unknown-freebsd -x
          yarn tsc -p examples/napi/tsconfig.json
          rm -rf examples/napi/__tests__
          mv examples/napi/dist/__tests__ examples/napi/
      - name: Test
        id: build
        uses: cross-platform-actions/action@v1.3.0
        env:
          DEBUG: 'napi:*'
          RUSTUP_HOME: /home/runner/rustup
          CARGO_HOME: /home/runner/cargo
          RUSTUP_IO_THREADS: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          operating_system: freebsd
          version: '15.0'
          memory: 12G
          cpu_count: 3
          environment_variables: 'DEBUG RUSTUP_IO_THREADS GITHUB_TOKEN'
          shell: bash
          run: |
            env | sort
            sudo pkg install -y -f curl node libnghttp2 npm
            sudo npm install -g corepack
            sudo corepack enable
            echo "~~~~ node -v ~~~~"
            node -v
            echo "~~~~ yarn --version ~~~~"
            yarn --version
            pwd
            ls -lah
            whoami
            env
            freebsd-version
            export NODE_OPTIONS="--max-old-space-size=8192"
            yarn workspace @examples/napi test-js -s

  test-custom-async-runtime-native:
    runs-on: ubuntu-latest
    name: Test custom async runtime on native
    timeout-minutes: 10
    needs: audit
    steps:
      - uses: actions/checkout@v7
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
          cache-dependency-path: 'yarn.lock'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: yarn install --immutable --mode=skip-build
      - name: Test previous derive against current runtime
        run: |
          cargo build --locked --manifest-path crates/napi/tests/fixtures/previous-derive/Cargo.toml
          node crates/napi/tests/fixtures/previous-derive/test.mjs
      - name: Build
        run: |
          node cli/cli.mjs build \
            --cwd examples/custom-async-runtime \
            --platform \
            --js index.cjs \
            --dts index.d.cts
      - name: Test
        run: node examples/custom-async-runtime/test.mjs native

  check-custom-async-runtime-wasi:
    runs-on: ubuntu-latest
    name: Test custom async runtime on WASI
    timeout-minutes: 10
    needs: audit
    steps:
      - uses: actions/checkout@v7
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
          cache-dependency-path: 'yarn.lock'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1, wasm32-wasip1-threads
      - name: Install dependencies
        run: yarn install --immutable --mode=skip-build
      - name: Build WASM runtime
        run: yarn workspace @napi-rs/wasm-runtime build
      - name: Check threadless WASI Tokio API feature sets
        run: |
          cargo check -p napi --no-default-features --features napi4,tokio_rt --target wasm32-wasip1 --test runtime_api_compile
          cargo check -p napi --no-default-features --features napi4,async-runtime,tokio_rt --target wasm32-wasip1 --test runtime_api_compile
        env:
          EMNAPI_LINK_DIR: ${{ github.workspace }}/node_modules/emnapi/lib/wasm32-wasip1
      - name: Check non-noop runtime feature sets
        run: |
          cargo check -p napi --no-default-features --features napi4,async-runtime --target wasm32-wasip1-threads
          cargo check -p napi --no-default-features --features napi4,async-runtime,tokio_rt --target wasm32-wasip1-threads
          cargo check -p napi-custom-async-runtime-example --target wasm32-wasip1-threads
          cargo check -p napi-examples --features noop --target wasm32-wasip1-threads
        env:
          EMNAPI_LINK_DIR: ${{ github.workspace }}/node_modules/emnapi/lib/wasm32-wasip1-threads
          RUSTFLAGS: '--cfg tokio_unstable'
      - name: Check minimal cleanup-hook imports
        run: |
          for api in napi3 napi4; do
            cargo build \
              --manifest-path examples/napi/wasi-cleanup-hook-link/Cargo.toml \
              --target wasm32-wasip1-threads \
              --target-dir "target/wasi-cleanup-hook-${api}" \
              --no-default-features \
              --features "${api}"
            node examples/napi/wasi-cleanup-hook-link/check-imports.mjs \
              "target/wasi-cleanup-hook-${api}/wasm32-wasip1-threads/debug/napi_wasi_cleanup_hook_link.wasm" \
              "${api}"
          done
        env:
          EMNAPI_LINK_DIR: ${{ github.workspace }}/node_modules/emnapi/lib/wasm32-wasip1-threads
      - name: Test threadless WASI artifact
        run: yarn workspace @examples/custom-async-runtime test:wasi
      - name: Test threaded WASI artifact
        run: yarn workspace @examples/custom-async-runtime test:wasi-threads
        env:
          RUSTFLAGS: '--cfg tokio_unstable'

  check-unix-runtime-module-retention:
    runs-on: ubuntu-latest
    name: Codegen runtime module retention - ${{ matrix.target }}
    timeout-minutes: 25
    needs: audit
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - powerpc64-ibm-aix
          - x86_64-unknown-openbsd
          - x86_64-unknown-dragonfly
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: nightly-${{ matrix.target }}-cargo-cache-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            nightly-${{ matrix.target }}-cargo-cache-
      - name: Codegen runtime feature sets
        run: |
          for features in \
            napi4,tokio_rt \
            napi4,async-runtime \
            napi4,async-runtime,tokio_rt
          do
            echo "::group::cargo rustc --features ${features}"
            cargo rustc \
              -p napi \
              --lib \
              --no-default-features \
              --features "${features}" \
              --target ${{ matrix.target }} \
              -Zbuild-std=std,panic_abort \
              -- \
              --emit=llvm-ir
            echo '::endgroup::'
          done
        env:
          CARGO_TARGET_POWERPC64_IBM_AIX_RUSTFLAGS: '-Dwarnings'
          CARGO_TARGET_X86_64_UNKNOWN_OPENBSD_RUSTFLAGS: '-Dwarnings'
          CARGO_TARGET_X86_64_UNKNOWN_DRAGONFLY_RUSTFLAGS: '-Dwarnings'

  test-async-runtime-spi:
    runs-on: ubuntu-latest
    name: Test async-runtime SPI (cargo)
    timeout-minutes: 15
    needs: audit
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: async-runtime-spi-cargo-cache
      - name: Check pure async-runtime build is tokio-free
        run: |
          cargo check -p napi --features async-runtime
          if cargo tree -p napi --features async-runtime -e normal --prefix none | grep -E '^tokio v'; then
            echo 'tokio leaked back into the pure async-runtime build' >&2
            exit 1
          fi
      - name: Test async-runtime (pure)
        run: cargo test -p napi --features async-runtime
      - name: Compile runtime helper API (tokio_rt)
        run: cargo test -p napi --features tokio_rt --test runtime_api_compile
      - name: Test tokio_rt lifecycle (pure)
        run: cargo test -p napi --no-default-features --features napi4,tokio_rt,dyn-symbols --lib --test tokio_runtime_lifecycle
      - name: Test async-runtime + tokio_rt (combined)
        run: cargo test -p napi --features async-runtime,tokio_rt

  test-custom-async-runtime-wasi:
    runs-on: ubuntu-latest
    name: Test custom async runtime on wasm32-wasip1
    timeout-minutes: 10
    needs: audit
    steps:
      - uses: actions/checkout@v7
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
          cache-dependency-path: 'yarn.lock'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - name: Install dependencies
        run: yarn install --immutable --mode=skip-build
      - name: Build
        run: |
          yarn workspace @napi-rs/wasm-runtime build
          node cli/cli.mjs build \
            --cwd examples/custom-async-runtime \
            --target wasm32-wasip1 \
            --platform \
            --js index.cjs \
            --no-default-features \
            --features async-runtime \
            --dts index.d.cts
          yarn workspace @examples/napi build --target wasm32-wasip1 --profile wasi
          # Native builds regenerate every configured WASI flavor.
          yarn workspace @examples/napi build --target x86_64-unknown-linux-gnu --release
      - name: Test
        run: node examples/custom-async-runtime/test.mjs wasi
      - name: Test public Buffer API
        run: yarn workspace @examples/napi test __tests__/wasi-buffer-public-api.spec.ts
        env:
          NAPI_RS_TEST_THREADLESS_WASI_BUFFER: '1'
      - name: Test lifecycle public surface
        run: |
          yarn workspace @examples/napi test \
            __tests__/lifecycle-public-surface.spec.ts \
            __tests__/stock-emnapi-lifecycle.spec.ts
        env:
          WASI_TEST: 'true'
          NAPI_RS_WASI_FLAVOR: wasm32-wasip1
      - name: Browser test (single-thread, no cross-origin isolation)
        run: |
          yarn workspace @examples/custom-async-runtime playwright install chromium
          yarn workspace @examples/custom-async-runtime test:browser
      - name: Workerd test (miniflare)
        run: yarn workspace @examples/custom-async-runtime test:workerd

  test-node-wasi:
    runs-on: ubuntu-latest
    name: Test node wasi target
    timeout-minutes: 10
    needs: audit
    steps:
      - uses: actions/checkout@v7
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
          cache-dependency-path: 'yarn.lock'
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-wasip1-threads
      - name: Install dependencies
        run: yarn install --immutable --mode=skip-build
      - name: Check non-noop combined runtime and all features
        run: |
          cargo check -p napi --no-default-features --features napi4,async-runtime,tokio_rt --target wasm32-wasip1-threads
          cargo check -p napi --all-features --target wasm32-wasip1-threads
        env:
          RUSTFLAGS: '--cfg tokio_unstable'
      - name: Build
        run: |
          yarn build
          yarn workspace @examples/napi build --target wasm32-wasip1-threads --profile wasi
          # Native builds also regenerate configured WASI loaders.
          yarn workspace @examples/napi build --target x86_64-unknown-linux-gnu --release
        env:
          RUSTFLAGS: '--cfg tokio_unstable'
      - name: Test
        run: yarn workspace @examples/napi test -s
        env:
          WASI_TEST: 'true'
          NODE_OPTIONS: '--max-old-space-size=8192'
          SKIP_UNWIND_TEST: 1
      - name: Browser test
        run: |
          yarn workspace @examples/napi playwright install chromium
          yarn workspace @examples/napi vitest

  test-latest-bun:
    runs-on: ubuntu-latest
    name: Test latest bun
    timeout-minutes: 10
    needs: audit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: stable-x86_64-unknown-linux-gnu-node@18-cargo-cache
      - name: Install dependencies
        run: yarn install --immutable --mode=skip-build
      - name: Build
        run: |
          bun run build
          yarn workspace @examples/napi build --features dyn-symbols
      - name: Test
        continue-on-error: true
        run: bun run test:bun
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    needs:
      - done
    if: "startsWith(github.event.head_commit.message, 'chore(release): publish')"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - name: Publish
        run: |
          yarn install --mode=skip-build
          npm install -g npm
          yarn build
          node ./.github/publish.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  done:
    runs-on: ubuntu-latest
    # Job-level always(): a job whose `needs` include a failed or skipped
    # dependency is SKIPPED by default, and a step-level always() cannot
    # resurrect a skipped job. Without this, a failing `audit` would skip every
    # downstream job AND skip `done` itself — and a skipped aggregate check does
    # not block a merge. always() forces `done` to run so the step below can
    # fail the run.
    if: ${{ always() }}
    needs:
      - audit
      - lint
      - trybuild
      - test-cli-node-baselines
      - build_and_test
      - build-and-test-msys2
      - build_only
      - test_in_docker
      - build-and-test-linux-armv7
      - build_binary_crate
      - check-all-features
      - test-freebsd
      - test-custom-async-runtime-native
      - check-custom-async-runtime-wasi
      - check-unix-runtime-module-retention
      - test-async-runtime-spi
      - test-custom-async-runtime-wasi
      - test-node-wasi
      - test-latest-bun
    steps:
      # `skipped` is included because a failed `audit` (or a failed
      # build_musl/build_for_test_in_docker upstream of test_in_docker) leaves
      # the affected `needs` as `skipped`, not `failure`.
      - run: exit 1
        if: ${{ always() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')) }}
