# Dogfood: audit napi-rs's own lifecycle scripts with script-jail.
#
# Step 1 (this workflow, mode: update, install OFF): generate a v0.2.5
# `.script-jail.lock.yml` in the Docker audit backend.  GitHub-hosted runners have
# Docker but not /dev/kvm, so the Firecracker backend is unavailable and `backend:
# docker` is the install-aligned choice; Docker also writes the audit events/strace
# to the host-backed overlay (no fixed 4 GB scratch disk), so a large monorepo like
# napi-rs does not ENOSPC the way the fixed-disk VM backends can.  The generated
# lock is uploaded as an artifact.
#
# Step 2 (follow-up): commit the Docker-produced lock from this run, then flip to
# `mode: check` + `install: true` — the trusted host re-run then executes lifecycle
# scripts, exercising script-jail's env-allowlist + trusted-TMPDIR host/audit parity.
# `install: true` REQUIRES `mode: check` (update mode has no fail-closed signal), and
# the lock is backend-specific, so it must be this Docker-produced lock.
name: script-jail audit

on:
  workflow_dispatch: {}
  # Run on PRs that touch the lockfile or the script-jail config/workflow, so this
  # PR (which adds the workflow) gets an immediate signal without spamming every PR.
  pull_request:
    paths:
      - 'yarn.lock'
      - '.script-jail.yml'
      - '.script-jail.lock.yml'
      - '.github/workflows/script-jail.yml'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - name: script-jail audit (Docker backend, generate lock)
        uses: Brooooooklyn/script-jail@v0.2.5
        with:
          mode: update
          backend: docker
          spoof-platform: linux
          spoof-arch: x64
      - name: Upload generated lock + config
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: script-jail-lock
          path: |
            .script-jail.lock.yml
            .script-jail.yml
