# Dogfood: audit napi-rs's own lifecycle scripts with script-jail (safe install).
#
# Step 1 (this workflow, mode: update): generate `.script-jail.lock.yml` in the
# Docker audit backend (GitHub-hosted runners have Docker, not /dev/kvm, so the
# Firecracker backend is unavailable — `backend: docker` is the install-aligned
# choice).  `install: true` runs the no-scripts install on the host after the
# audit; the lifecycle-script host re-run only happens in `mode: check` against a
# MATCHING committed lock (trusted), so this first run just produces the lock +
# the egress report.  Commit the generated lock from this run, then flip `mode`
# to `check` to exercise the full install:true host re-run (env-allowlist +
# trusted-TMPDIR parity).
#
# NOTE: the lock is backend-specific (the Docker guest and the VZ/FC guest record
# TMPDIR differently — see script-jail's known audit-attribution residual), so
# the committed lock MUST be the one this Docker run produced, not a local
# macOS-vz lock.
name: script-jail audit

on:
  workflow_dispatch: {}
  # Run on PRs that touch the lockfile or the script-jail config/workflow, so this
  # PR (which adds the workflow) gets an immediate signal without spamming every PR.
  pull_request:
    paths:
      - 'yarn.lock'
      - '.script-jail.yml'
      - '.script-jail.lock.yml'
      - '.github/workflows/script-jail.yml'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - name: script-jail safe install + audit (Docker backend)
        uses: Brooooooklyn/script-jail@v0.2.5
        with:
          install: 'true'
          backend: docker
          mode: update
      - name: Upload generated lock + config
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: script-jail-lock
          path: |
            .script-jail.lock.yml
            .script-jail.yml
